<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#047857"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <linearGradient id="bgDark" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#065f46"/>
      <stop offset="100%" stop-color="#047857"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#6ee7b7"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.3"/>
    </filter>
    <filter id="innerGlow">
      <feGaussianBlur in="SourceAlpha" stdDeviation="6" result="blur"/>
      <feOffset dx="0" dy="-2" result="offsetBlur"/>
      <feMerge>
        <feMergeNode in="offsetBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <clipPath id="roundedSquare">
      <rect x="0" y="0" width="512" height="512" rx="112" ry="112"/>
    </clipPath>
  </defs>

  <!-- Rounded square background -->
  <rect x="0" y="0" width="512" height="512" rx="112" ry="112" fill="url(#bgDark)"/>

  <!-- Subtle gradient overlay -->
  <rect x="0" y="0" width="512" height="512" rx="112" ry="112" fill="url(#bg)" opacity="0.3"/>

  <!-- Background decorative circles -->
  <circle cx="380" cy="120" r="160" fill="rgba(52,211,153,0.04)"/>
  <circle cx="140" cy="400" r="140" fill="rgba(52,211,153,0.03)"/>

  <!-- House roof -->
  <g filter="url(#shadow)">
    <path d="M256 80 L420 200 L420 380 Q420 400 400 400 L112 400 Q92 400 92 380 L92 200 Z" fill="rgba(255,255,255,0.12)" stroke="rgba(255,255,255,0.2)" stroke-width="3"/>
  </g>

  <!-- Roof top -->
  <polygon points="256,80 420,200 92,200" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.15)" stroke-width="2.5" stroke-linejoin="round"/>

  <!-- Chimney -->
  <rect x="340" y="120" width="36" height="70" rx="6" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.1)" stroke-width="2"/>

  <!-- Chimney cap -->
  <rect x="336" y="116" width="44" height="10" rx="4" fill="rgba(255,255,255,0.08)"/>

  <!-- House body (inside) -->
  <rect x="132" y="200" width="248" height="40" rx="4" fill="rgba(255,255,255,0.04)"/>

  <!-- Main door -->
  <rect x="216" y="264" width="80" height="136" rx="8" fill="rgba(255,255,255,0.1)" stroke="rgba(255,255,255,0.15)" stroke-width="2.5"/>

  <!-- Door arch -->
  <path d="M216 280 Q216 264 230 264 L282 264 Q296 264 296 280" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1.5"/>

  <!-- Door handle (keyhole) -->
  <circle cx="272" cy="330" r="10" fill="rgba(255,255,255,0.25)"/>
  <circle cx="272" cy="330" r="5" fill="rgba(255,255,255,0.4)"/>
  <rect x="269" y="335" width="6" height="14" rx="3" fill="rgba(255,255,255,0.3)"/>

  <!-- Key icon (door handle area - stylized) -->
  <g transform="translate(272, 330)" opacity="0.6">
    <circle r="12" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="2"/>
    <line x1="0" y1="12" x2="0" y2="22" stroke="rgba(255,255,255,0.3)" stroke-width="2" stroke-linecap="round"/>
    <line x1="-5" y1="18" x2="5" y2="18" stroke="rgba(255,255,255,0.2)" stroke-width="1.5" stroke-linecap="round"/>
  </g>

  <!-- Windows -->
  <!-- Left window -->
  <g>
    <rect x="148" y="264" width="48" height="52" rx="6" fill="rgba(52,211,153,0.15)" stroke="rgba(255,255,255,0.12)" stroke-width="2"/>
    <line x1="172" y1="264" x2="172" y2="316" stroke="rgba(255,255,255,0.08)" stroke-width="1.5"/>
    <line x1="148" y1="290" x2="196" y2="290" stroke="rgba(255,255,255,0.08)" stroke-width="1.5"/>
  </g>

  <!-- Right window -->
  <g>
    <rect x="316" y="264" width="48" height="52" rx="6" fill="rgba(52,211,153,0.15)" stroke="rgba(255,255,255,0.12)" stroke-width="2"/>
    <line x1="340" y1="264" x2="340" y2="316" stroke="rgba(255,255,255,0.08)" stroke-width="1.5"/>
    <line x1="316" y1="290" x2="364" y2="290" stroke="rgba(255,255,255,0.08)" stroke-width="1.5"/>
  </g>

  <!-- Window glow effect -->
  <rect x="152" y="268" width="40" height="44" rx="4" fill="rgba(52,211,153,0.08)"/>
  <rect x="320" y="268" width="40" height="44" rx="4" fill="rgba(52,211,153,0.08)"/>

  <!-- Ground line -->
  <line x1="60" y1="400" x2="452" y2="400" stroke="rgba(255,255,255,0.05)" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Small decorative bushes -->
  <ellipse cx="130" cy="395" rx="20" ry="12" fill="rgba(52,211,153,0.1)"/>
  <ellipse cx="382" cy="395" rx="20" ry="12" fill="rgba(52,211,153,0.1)"/>

  <!-- Path/walkway -->
  <path d="M248 400 L240 440 L272 440 L264 400" fill="rgba(255,255,255,0.04)"/>

  <!-- R logo / branding mark at top right area -->
  <g transform="translate(420, 96)" opacity="0.15">
    <text font-family="Inter, -apple-system, sans-serif" font-size="28" font-weight="800" fill="white" text-anchor="end">RK</text>
  </g>

  <!-- Light reflection/shine on top-left -->
  <path d="M0 0 L112 0 Q100 20 80 30 L0 50 Z" fill="rgba(255,255,255,0.06)"/>

  <!-- Subtle border -->
  <rect x="0" y="0" width="512" height="512" rx="112" ry="112" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="2"/>
</svg>
